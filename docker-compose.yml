services:
  db:
    image: postgres:15-alpine
    restart: always
    container_name: alerta_doador-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=alerta_doador
    ports:
      - "5432:5432"
    networks:
      - alerta_doador
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    image: alerta_doador-backend
    container_name: alerta_doador-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/alerta_doador
      - PYTHONPATH=/app/src
    depends_on:
      - db
    networks:
        - alerta_doador
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build: ./frontend
    image: alerta_doador-frontend
    container_name: alerta_doador-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    networks:
      - alerta_doador

volumes:
  postgres_data:

networks:
  alerta_doador:
    name: alerta_doador  # Isso força o nome da rede a ser EXATAMENTE este
    driver: bridge