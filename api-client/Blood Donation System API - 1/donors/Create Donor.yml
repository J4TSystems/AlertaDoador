info:
  name: Create Donor
  type: http
  seq: 2
  tags:
    - donors

http:
  method: POST
  url: "{{baseUrl}}/donors/"
  body:
    type: json
    data: |-
      {
        "full_name": "",
        "email": "",
        "blood_type": "A+"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/donors/"
      method: POST
      body:
        type: json
        data: |-
          {
            "full_name": "",
            "email": "",
            "blood_type": "A+"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "full_name": "",
            "email": "",
            "blood_type": "A+"
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/donors/"
      method: POST
      body:
        type: json
        data: |-
          {
            "full_name": "",
            "email": "",
            "blood_type": "A+"
          }
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
