info:
  name: Get Donors
  type: http
  seq: 1
  tags:
    - donors

http:
  method: GET
  url: "{{baseUrl}}/donors/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/donors/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "full_name": "",
              "email": "",
              "blood_type": "A+"
            }
          ]
