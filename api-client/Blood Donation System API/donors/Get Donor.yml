info:
  name: Get Donor
  type: http
  seq: 3
  tags:
    - donors

http:
  method: GET
  url: "{{alerta_doador_backend}}/donors/1"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/donors/:donor_id"
      method: GET
      params:
        - name: donor_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "full_name": "",
            "email": "",
            "blood_type": "A+"
          }
  - name: 422 Response
    description: Validation Error
    request:
      url: "{{baseUrl}}/donors/:donor_id"
      method: GET
      params:
        - name: donor_id
          value: ""
          type: path
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "detail": [
              {
                "loc": [],
                "msg": "",
                "type": "",
                "input": "",
                "ctx": {}
              }
            ]
          }
