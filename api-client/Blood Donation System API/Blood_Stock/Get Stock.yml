info:
  name: Get Stock
  type: http
  seq: 1
  tags:
    - Blood_Stock

http:
  method: GET
  url: "{{alerta_doador_backend}}/stock/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/stock/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "blood_type": "A+",
              "status": "Critical",
              "last_updated": ""
            }
          ]
